    <text class="box-text" x="18" y="76">execution authority</text>
  </g>
  <g transform="translate(85 370)">
    <rect class="source" width="190" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Contracts / PIEE</text>
    <text class="box-text" x="18" y="58">Awards, invoices,</text>
    <text class="box-text" x="18" y="76">receipt evidence</text>
  </g>
  <g transform="translate(85 490)">
    <rect class="source" width="190" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">GCSS-MC</text>
    <text class="box-text" x="18" y="58">Supply, maintenance,</text>
    <text class="box-text" x="18" y="76">property impacts</text>
  </g>
  <g transform="translate(85 610)">
    <rect class="source" width="190" height="88" rx="12"/>

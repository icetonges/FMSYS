  <text class="node-text" x="98" y="485">WAWF / PIEE</text>
  <text class="small" x="98" y="510">invoice, receipt, accept</text>
  <rect class="node source" x="80" y="555" width="210" height="76"/>
  <text class="node-text" x="98" y="585">Labor / payroll</text>
  <text class="small" x="98" y="610">cost distribution</text>
  <rect class="node source" x="80" y="655" width="210" height="76"/>
  <text class="node-text" x="98" y="685">Collections / IPAC</text>
  <text class="small" x="98" y="710">reimbursable + IGT</text>


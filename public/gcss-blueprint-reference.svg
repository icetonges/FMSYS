<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">GCSS / GCSS-Army and GCSS-MC Logistics-to-Finance Blueprint</title>
  <desc id="desc">Static GCSS blueprint showing Army and Marine Corps logistics source events, GCSS core logistics, supply and maintenance detail, finance interfaces, reporting, and statement support.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { fill: #0f2f66; font: 900 58px Arial, sans-serif; }
      .subtitle { fill: #40506a; font: 700 24px Arial, sans-serif; }
      .layer { fill: #ffffff; stroke: #d7e0ee; stroke-width: 3; }
      .layer-title { fill: #0f2f66; font: 900 24px Arial, sans-serif; }
      .node { rx: 16; stroke-width: 3; }
      .node-text { fill: #172033; font: 800 19px Arial, sans-serif; }
      .small { fill: #556273; font: 600 15px Arial, sans-serif; }
      .source { fill: #ede7fb; stroke: #7a51c2; }
      .core { fill: #e7f4ef; stroke: #13895a; }
      .detail { fill: #e7f4f7; stroke: #16839b; }
      .accounting { fill: #eaf1ff; stroke: #255ba8; }
      .reporting { fill: #f0e9fb; stroke: #6c43b7; }
      .statement { fill: #fff0e2; stroke: #a45518; }
      .arrow { stroke: #0f2f66; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .callout { fill: #0f2f66; }
      .callout-text { fill: #ffffff; font: 800 20px Arial, sans-serif; }
      .caveat { fill: #667085; font: 600 16px Arial, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f2f66"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="70" y="88">GCSS / GCSS-Army and GCSS-MC Logistics-to-Finance Blueprint</text>
  <text class="subtitle" x="70" y="130">Supply, maintenance, property, readiness, inventory, and financial-event lineage from tactical logistics to accounting and statements</text>

  <rect class="layer" x="55" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="340" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="625" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="910" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="1195" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="1480" y="175" width="260" height="720" rx="22"/>

  <text class="layer-title" x="80" y="222">Source / Unit Events</text>
  <text class="layer-title" x="365" y="222">GCSS Core</text>
  <text class="layer-title" x="650" y="222">Logistics Detail</text>
  <text class="layer-title" x="935" y="222">Finance Interface</text>
  <text class="layer-title" x="1220" y="222">Reporting</text>
  <text class="layer-title" x="1505" y="222">Statements</text>

  <rect class="node source" x="80" y="255" width="210" height="76"/>
  <text class="node-text" x="98" y="285">Unit supply</text>
  <text class="small" x="98" y="310">requisition, issue, turn-in</text>
  <rect class="node source" x="80" y="355" width="210" height="76"/>
  <text class="node-text" x="98" y="385">Maintenance shops</text>
  <text class="small" x="98" y="410">work order, parts, labor</text>
  <rect class="node source" x="80" y="455" width="210" height="76"/>
  <text class="node-text" x="98" y="485">Property book</text>
  <text class="small" x="98" y="510">hand receipt, asset status</text>
  <rect class="node source" x="80" y="555" width="210" height="76"/>
  <text class="node-text" x="98" y="585">DLA / DLMS</text>
  <text class="small" x="98" y="610">supply status + billing</text>
  <rect class="node source" x="80" y="655" width="210" height="76"/>
  <text class="node-text" x="98" y="685">Finance systems</text>
  <text class="small" x="98" y="710">GFEBS, Navy ERP, SABRS</text>

  <rect class="node core" x="365" y="255" width="210" height="76"/>
  <text class="node-text" x="383" y="285">Supply execution</text>
  <text class="small" x="383" y="310">request, issue, receipt</text>
  <rect class="node core" x="365" y="355" width="210" height="76"/>
  <text class="node-text" x="383" y="385">Maintenance</text>
  <text class="small" x="383" y="410">equipment + work orders</text>
  <rect class="node core" x="365" y="455" width="210" height="76"/>
  <text class="node-text" x="383" y="485">Property accountability</text>
  <text class="small" x="383" y="510">serialized assets + custody</text>
  <rect class="node core" x="365" y="555" width="210" height="76"/>
  <text class="node-text" x="383" y="585">Inventory control</text>
  <text class="small" x="383" y="610">stock, valuation, location</text>
  <rect class="node core" x="365" y="655" width="210" height="76"/>
  <text class="node-text" x="383" y="685">Readiness / status</text>
  <text class="small" x="383" y="710">equipment availability</text>

  <rect class="node detail" x="650" y="255" width="210" height="76"/>
  <text class="node-text" x="668" y="285">Material master</text>
  <text class="small" x="668" y="310">NSN, part, U/I, price</text>
  <rect class="node detail" x="650" y="355" width="210" height="76"/>
  <text class="node-text" x="668" y="385">Requisition detail</text>
  <text class="small" x="668" y="410">document, status, due-in</text>
  <rect class="node detail" x="650" y="455" width="210" height="76"/>
  <text class="node-text" x="668" y="485">Work-order detail</text>
  <text class="small" x="668" y="510">fault, repair, parts</text>
  <rect class="node detail" x="650" y="555" width="210" height="76"/>
  <text class="node-text" x="668" y="585">Asset / equipment</text>
  <text class="small" x="668" y="610">serial, custody, value</text>
  <rect class="node detail" x="650" y="655" width="210" height="76"/>
  <text class="node-text" x="668" y="685">Inventory movement</text>
  <text class="small" x="668" y="710">receipt, issue, adjustment</text>

  <rect class="node accounting" x="935" y="315" width="210" height="76"/>
  <text class="node-text" x="953" y="345">Commitment / obligation</text>
  <text class="small" x="953" y="370">funds control + orders</text>
  <rect class="node accounting" x="935" y="435" width="210" height="76"/>
  <text class="node-text" x="953" y="465">Inventory / asset value</text>
  <text class="small" x="953" y="490">capital, expensed, stock</text>
  <rect class="node accounting" x="935" y="555" width="210" height="76"/>
  <text class="node-text" x="953" y="585">Billing / AP / GL</text>
  <text class="small" x="953" y="610">interfund + accounting</text>

  <rect class="node reporting" x="1220" y="315" width="210" height="76"/>
  <text class="node-text" x="1238" y="345">Readiness reports</text>
  <text class="small" x="1238" y="370">equipment + supply status</text>
  <rect class="node reporting" x="1220" y="435" width="210" height="76"/>
  <text class="node-text" x="1238" y="465">ERP / finance extracts</text>
  <text class="small" x="1238" y="490">GFEBS, SABRS, Navy ERP</text>
  <rect class="node reporting" x="1220" y="555" width="210" height="76"/>
  <text class="node-text" x="1238" y="585">DDRS / GTAS</text>
  <text class="small" x="1238" y="610">trial balance support</text>

  <rect class="node statement" x="1505" y="315" width="210" height="76"/>
  <text class="node-text" x="1523" y="345">SBR</text>
  <text class="small" x="1523" y="370">obligation to outlay</text>
  <rect class="node statement" x="1505" y="435" width="210" height="76"/>
  <text class="node-text" x="1523" y="465">Inventory / PP&E</text>
  <text class="small" x="1523" y="490">existence + valuation</text>
  <rect class="node statement" x="1505" y="555" width="210" height="76"/>
  <text class="node-text" x="1523" y="585">Net cost / notes</text>
  <text class="small" x="1523" y="610">maintenance + supply cost</text>

  <path class="arrow" d="M 293 493 H 358"/>
  <path class="arrow" d="M 578 493 H 643"/>
  <path class="arrow" d="M 863 493 H 928"/>
  <path class="arrow" d="M 1148 493 H 1213"/>
  <path class="arrow" d="M 1433 493 H 1498"/>

  <rect class="callout" x="70" y="935" width="1660" height="92" rx="20"/>
  <text class="callout-text" x="100" y="970">Tech-stack note: GCSS-Army is treated as an Army SAP-style tactical logistics ERP; GCSS-MC public platform details are more limited.</text>
  <text class="callout-text" x="100" y="1000">Both pages focus on auditable logistics-to-finance business processes rather than claiming exact current table/interface configurations.</text>
  <text class="caveat" x="70" y="1060">Source basis: GCSS public descriptions, Marine Corps Systems Command mission, logistics/financial-reporting controls, DoD FMR, Treasury GTAS/USSGL/IGT requirements.</text>
</svg>

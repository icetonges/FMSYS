  <text class="layer-title" x="610" y="215">DETAIL RECORDS</text>
  <text class="layer-title" x="880" y="215">ACCOUNTING CONTROL</text>
  <text class="layer-title" x="1160" y="215">REPORTING</text>
  <text class="layer-title" x="1360" y="215">STATEMENTS</text>

  <g transform="translate(85 250)">

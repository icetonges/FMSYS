<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">CEFMS / Corps of Engineers Financial Management System Blueprint</title>
  <desc id="desc">Static reference blueprint for CEFMS showing USACE source systems, CEFMS accounting, project cost controls, reporting, Treasury, and financial statement support.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { fill: #0f2f66; font: 900 58px Arial, sans-serif; }
      .subtitle { fill: #40506a; font: 700 24px Arial, sans-serif; }
      .layer { fill: #ffffff; stroke: #d7e0ee; stroke-width: 3; }
      .layer-title { fill: #0f2f66; font: 900 25px Arial, sans-serif; }
      .node { rx: 16; stroke-width: 3; }
      .node-text { fill: #172033; font: 800 20px Arial, sans-serif; }
      .small { fill: #556273; font: 600 15px Arial, sans-serif; }
      .source { fill: #ede7fb; stroke: #7a51c2; }
      .core { fill: #e7f4ef; stroke: #13895a; }
      .detail { fill: #e7f4f7; stroke: #16839b; }
      .accounting { fill: #eaf1ff; stroke: #255ba8; }
      .reporting { fill: #f0e9fb; stroke: #6c43b7; }
      .statement { fill: #fff0e2; stroke: #a45518; }
      .arrow { stroke: #0f2f66; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .callout { fill: #0f2f66; }
      .callout-text { fill: #ffffff; font: 800 20px Arial, sans-serif; }
      .caveat { fill: #667085; font: 600 16px Arial, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f2f66"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="70" y="88">CEFMS / Corps of Engineers Financial Management System Blueprint</text>
  <text class="subtitle" x="70" y="130">USACE project funds, obligations, payments, disbursing, accounting, reporting, and statement support</text>

  <rect class="layer" x="55" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="340" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="625" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="910" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="1195" y="175" width="260" height="720" rx="22"/>
  <rect class="layer" x="1480" y="175" width="260" height="720" rx="22"/>

  <text class="layer-title" x="80" y="222">Source / Mission Events</text>
  <text class="layer-title" x="365" y="222">CEFMS Core</text>
  <text class="layer-title" x="650" y="222">Project Detail</text>
  <text class="layer-title" x="935" y="222">Accounting</text>
  <text class="layer-title" x="1220" y="222">Reporting / Treasury</text>
  <text class="layer-title" x="1505" y="222">Statements</text>

  <rect class="node source" x="80" y="255" width="210" height="76"/>
  <text class="node-text" x="98" y="285">P2 / PROMIS /</text>
  <text class="node-text" x="98" y="310">project systems</text>
  <rect class="node source" x="80" y="355" width="210" height="76"/>
  <text class="node-text" x="98" y="385">SPS / Procurement</text>
  <text class="small" x="98" y="410">awards + mods</text>

    <text class="box-title" x="18" y="32">Reimbursable Detail</text>
    <text class="box-text" x="18" y="58">Order, customer,</text>
    <text class="box-text" x="18" y="76">billing, collection</text>
  </g>
  <g transform="translate(610 610)">
    <rect class="detail" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">JV / Suspense</text>
    <text class="box-text" x="18" y="58">Manual adjustment,</text>
    <text class="box-text" x="18" y="76">reject clearing</text>
  </g>

  <g transform="translate(885 250)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Budgetary GL</text>
    <text class="box-text" x="18" y="58">Authority, obligation,</text>
    <text class="box-text" x="18" y="76">expenditure, outlay</text>

  <g transform="translate(1370 390)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">MTS / CS</text>
    <text class="box-text" x="18" y="61">Budgetary reports</text>
  </g>
  <g transform="translate(1370 500)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">FR-USG</text>
    <text class="box-text" x="18" y="61">Governmentwide FR</text>
  </g>
  <g transform="translate(1370 610)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">FBWT</text>
    <text class="box-text" x="18" y="61">Tie-out support</text>

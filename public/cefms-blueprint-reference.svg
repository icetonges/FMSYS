  <text class="node-text" x="383" y="285">Funds control</text>
  <text class="small" x="383" y="310">authority to outlay</text>
  <rect class="node core" x="365" y="355" width="210" height="76"/>
  <text class="node-text" x="383" y="385">Obligations</text>
  <text class="small" x="383" y="410">commitments + awards</text>
  <rect class="node core" x="365" y="455" width="210" height="76"/>
  <text class="node-text" x="383" y="485">AP / AR</text>
  <text class="small" x="383" y="510">invoice, billing, debt</text>
  <rect class="node core" x="365" y="555" width="210" height="76"/>
  <text class="node-text" x="383" y="585">Disbursing</text>
  <text class="small" x="383" y="610">payments + collections</text>
  <rect class="node core" x="365" y="655" width="210" height="76"/>
  <text class="node-text" x="383" y="685">JV / close</text>
  <text class="small" x="383" y="710">corrections + accruals</text>

  <rect class="node detail" x="650" y="255" width="210" height="76"/>
  <text class="node-text" x="668" y="285">Project / WBS</text>
  <text class="small" x="668" y="310">civil + military works</text>
  <rect class="node detail" x="650" y="355" width="210" height="76"/>
  <text class="node-text" x="668" y="385">Cost objects</text>
  <text class="small" x="668" y="410">labor, contract, overhead</text>
  <rect class="node detail" x="650" y="455" width="210" height="76"/>
  <text class="node-text" x="668" y="485">Reimbursables</text>
  <text class="small" x="668" y="510">customer orders + bills</text>
  <rect class="node detail" x="650" y="555" width="210" height="76"/>
  <text class="node-text" x="668" y="585">Real property / assets</text>
  <text class="small" x="668" y="610">capital + stewardship</text>
  <rect class="node detail" x="650" y="655" width="210" height="76"/>
  <text class="node-text" x="668" y="685">CEEMIS / analytics</text>
  <text class="small" x="668" y="710">management data</text>


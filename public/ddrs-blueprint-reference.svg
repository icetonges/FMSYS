    <text class="box-text" x="18" y="58">Entity, TAS, USSGL,</text>
    <text class="box-text" x="18" y="76">attribute, amount</text>
  </g>
  <g transform="translate(610 370)">
    <rect class="detail" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Journal Detail</text>
    <text class="box-text" x="18" y="58">Top-side support,</text>
    <text class="box-text" x="18" y="76">approval, reversal</text>
  </g>
  <g transform="translate(610 490)">
    <rect class="detail" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">IGT Detail</text>
    <text class="box-text" x="18" y="58">Trading partner,</text>
    <text class="box-text" x="18" y="76">elimination pair</text>
  </g>
  <g transform="translate(610 610)">
    <rect class="detail" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Note Schedules</text>
    <text class="box-text" x="18" y="58">Narrative, tables,</text>
    <text class="box-text" x="18" y="76">variance support</text>
  </g>

  <g transform="translate(885 250)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">USSGL / TAS Edits</text>
    <text class="box-text" x="18" y="58">Valid accounts,</text>
    <text class="box-text" x="18" y="76">attributes, balances</text>
  </g>
  <g transform="translate(885 370)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">GTAS Tie-Out</text>
    <text class="box-text" x="18" y="58">Treasury submission,</text>
    <text class="box-text" x="18" y="76">fatal/edit checks</text>
  </g>
  <g transform="translate(885 490)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Elimination Control</text>
    <text class="box-text" x="18" y="58">IGT differences,</text>
    <text class="box-text" x="18" y="76">buyer/seller support</text>
  </g>
  <g transform="translate(885 610)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Audit Tie-Out</text>
    <text class="box-text" x="18" y="58">Statement to source,</text>
    <text class="box-text" x="18" y="76">sample support</text>
  </g>


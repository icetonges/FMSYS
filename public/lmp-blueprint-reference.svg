    <text class="box-title" x="18" y="32">Inventory Moves</text>
    <text class="box-text" x="18" y="58">Receipt, issue, count,</text>
    <text class="box-text" x="18" y="76">adjustment history</text>
  </g>

  <g transform="translate(885 250)">

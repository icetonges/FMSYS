  <rect class="panel" x="70" y="905" width="1460" height="90" rx="14"/>
  <text class="note" x="95" y="940">Tech-stack note: public FAMIS-GF/FAMIS-WCF technical documentation is thin; this model does not claim SAP or Oracle.</text>
  <text class="note" x="95" y="970">Audit lens: compare GF budget execution with WCF cost recovery while preserving document, GL, trial balance, and statement lineage.</text>

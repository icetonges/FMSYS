    <text class="box-title" x="18" y="32">AWCF Costing</text>
    <text class="box-text" x="18" y="58">Rates, cost recovery,</text>
    <text class="box-text" x="18" y="76">customer billing</text>
  </g>
  <g transform="translate(885 370)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Inventory Value</text>
    <text class="box-text" x="18" y="58">Quantity, condition,</text>

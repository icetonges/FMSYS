  <g transform="translate(1370 390)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">Net Cost</text>
    <text class="box-text" x="18" y="61">Program cost</text>
  </g>
  <g transform="translate(1370 500)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">Balance Sheet</text>
    <text class="box-text" x="18" y="61">Assets/liabilities</text>
  </g>
  <g transform="translate(1370 610)">
    <rect class="statement" width="135" height="88" rx="12"/>
    <text class="box-title" x="18" y="34">Notes</text>
    <text class="box-text" x="18" y="61">Disclosures</text>
  </g>

  <path class="arrow" d="M 280 294 H 330"/>
  <path class="arrow" d="M 545 294 H 600"/>
  <path class="arrow" d="M 815 294 H 875"/>
  <path class="arrow" d="M 1090 294 H 1150"/>
  <path class="arrow" d="M 1325 350 H 1360"/>
  <path class="arrow" d="M 280 414 H 330"/>
  <path class="arrow" d="M 545 414 H 600"/>
  <path class="arrow" d="M 815 414 H 875"/>
  <path class="arrow" d="M 1090 414 C 1120 414 1130 500 1150 520"/>
  <path class="arrow" d="M 1325 530 H 1360"/>
  <path class="arrow" d="M 280 534 H 330"/>
  <path class="arrow" d="M 545 534 H 600"/>
  <path class="arrow" d="M 815 534 H 875"/>
  <path class="arrow" d="M 1090 534 H 1150"/>

  <rect class="panel" x="70" y="905" width="1460" height="90" rx="14"/>
  <text class="note" x="95" y="940">Scope note: DDRS here means Defense Departmental Reporting System for financial reporting, not Defense Readiness Reporting System.</text>
  <text class="note" x="95" y="970">Audit lens: reconcile component trial balances, USSGL/TAS edits, eliminations, GTAS, statements, notes, and source support.</text>
</svg>

    <text class="box-title" x="18" y="32">Navy ERP Tie-Out</text>
    <text class="box-text" x="18" y="58">DON reporting and</text>
    <text class="box-text" x="18" y="76">transition bridge</text>
  </g>
  <g transform="translate(885 610)">
    <rect class="finance" width="200" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Controls</text>
    <text class="box-text" x="18" y="58">Approvals, suspense,</text>
    <text class="box-text" x="18" y="76">reconciliations</text>
  </g>


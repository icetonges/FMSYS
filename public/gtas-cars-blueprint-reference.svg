<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">GTAS and CARS Treasury Reporting Blueprint</title>
  <desc id="desc">Static source-to-statement blueprint for Treasury GTAS and CARS central accounting reporting lineage.</desc>
  <defs>
    <style>
      .bg { fill: #f5f8fc; }
      .panel { fill: #ffffff; stroke: #d5e1f2; stroke-width: 2; }
      .title { fill: #08234a; font: 800 43px Arial, sans-serif; }
      .subtitle { fill: #415778; font: 21px Arial, sans-serif; }
      .layer-title { fill: #0b2f66; font: 800 20px Arial, sans-serif; letter-spacing: .8px; }
      .box-title { fill: #ffffff; font: 800 20px Arial, sans-serif; }
      .box-text { fill: #e9f2ff; font: 15px Arial, sans-serif; }
      .note { fill: #253b5b; font: 16px Arial, sans-serif; }
      .arrow { stroke: #163e7a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .source { fill: #174f9a; }
      .core { fill: #155f77; }
      .detail { fill: #7152b8; }
      .finance { fill: #b05a1f; }
      .report { fill: #7a3d86; }
      .statement { fill: #132f58; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#163e7a"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1040"/>
  <text class="title" x="70" y="88">GTAS and CARS / Treasury Reporting Blueprint</text>
  <text class="subtitle" x="70" y="124">Governmentwide adjusted trial balance plus central accounting record for TAS-BETC, FBWT, MTS, Combined Statement, and U.S. Government Financial Report support</text>

  <rect class="panel" x="55" y="165" width="1490" height="710" rx="18"/>

  <text class="layer-title" x="90" y="215">AGENCY / TREASURY SOURCES</text>
  <text class="layer-title" x="340" y="215">GTAS / CARS CORE</text>
  <text class="layer-title" x="610" y="215">DETAIL RECORDS</text>
  <text class="layer-title" x="880" y="215">VALIDATION CONTROL</text>
  <text class="layer-title" x="1160" y="215">TREASURY OUTPUTS</text>
  <text class="layer-title" x="1360" y="215">REPORTS</text>

  <g transform="translate(85 250)">
    <rect class="source" width="190" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">Agency ATB</text>
    <text class="box-text" x="18" y="58">TAS, USSGL, attributes,</text>
    <text class="box-text" x="18" y="76">budget execution</text>
  </g>
  <g transform="translate(85 370)">
    <rect class="source" width="190" height="88" rx="12"/>
    <text class="box-title" x="18" y="32">DDRS / ERPs</text>
    <text class="box-text" x="18" y="58">Component reporting</text>
    <text class="box-text" x="18" y="76">and close tie-outs</text>
  </g>
  <g transform="translate(85 490)">
    <rect class="source" width="190" height="88" rx="12"/>

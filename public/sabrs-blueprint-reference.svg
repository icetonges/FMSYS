    <text class="box-title" x="18" y="34">SBR</text>
    <text class="box-text" x="18" y="61">Budgetary</text>
    <text class="box-text" x="18" y="80">resources</text>
  </g>
  <g transform="translate(1370 430)">
    <rect class="statement" width="135" height="100" rx="12"/>
    <text class="box-title" x="18" y="34">Net Cost</text>
    <text class="box-text" x="18" y="61">Expense and</text>
    <text class="box-text" x="18" y="80">program cost</text>
  </g>
  <g transform="translate(1370 560)">
    <rect class="statement" width="135" height="100" rx="12"/>
    <text class="box-title" x="18" y="34">Notes</text>
    <text class="box-text" x="18" y="61">ULO, FBWT,</text>
    <text class="box-text" x="18" y="80">reimbursables</text>
  </g>

  <path class="arrow" d="M 280 294 H 330"/>
  <path class="arrow" d="M 545 294 H 600"/>
  <path class="arrow" d="M 815 294 H 875"/>
  <path class="arrow" d="M 1090 294 H 1150"/>
  <path class="arrow" d="M 1325 350 H 1360"/>
  <path class="arrow" d="M 280 414 H 330"/>
  <path class="arrow" d="M 545 414 H 600"/>
  <path class="arrow" d="M 815 414 H 875"/>
  <path class="arrow" d="M 1090 414 C 1120 414 1130 500 1150 520"/>
  <path class="arrow" d="M 1325 530 H 1360"/>
  <path class="arrow" d="M 280 534 H 330"/>
  <path class="arrow" d="M 545 534 H 600"/>
  <path class="arrow" d="M 815 534 H 875"/>
  <path class="arrow" d="M 1090 534 H 1150"/>
  <path class="arrow" d="M 1325 530 C 1345 530 1345 610 1360 610"/>

  <rect class="panel" x="70" y="905" width="1460" height="90" rx="14"/>
  <text class="note" x="95" y="940">Tech-stack note: SABRS is modeled as a Marine Corps legacy/core accounting, budgeting, and reporting system, not as SAP or Oracle ERP.</text>
  <text class="note" x="95" y="970">Audit lens: preserve budget execution, obligation, expense, reimbursable, JV, suspense, trial balance, and USMC AFR support lineage.</text>
</svg>

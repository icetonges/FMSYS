  <text class="node-text" x="953" y="455">Proprietary USSGL</text>
  <text class="small" x="953" y="480">assets, AP, AR, cost</text>
  <rect class="node accounting" x="935" y="545" width="210" height="76"/>
  <text class="node-text" x="953" y="575">General ledger</text>
  <text class="small" x="953" y="600">trial balance basis</text>

  <rect class="node reporting" x="1220" y="305" width="210" height="76"/>
  <text class="node-text" x="1238" y="335">CEEMIS reports</text>
  <text class="small" x="1238" y="360">real-time browser query</text>
  <rect class="node reporting" x="1220" y="425" width="210" height="76"/>
  <text class="node-text" x="1238" y="455">DDRS / GTAS</text>
  <text class="small" x="1238" y="480">ATB + edits</text>
  <rect class="node reporting" x="1220" y="545" width="210" height="76"/>
  <text class="node-text" x="1238" y="575">Treasury / FBwT</text>
  <text class="small" x="1238" y="600">CARS, IPAC, cash</text>

  <rect class="node statement" x="1505" y="305" width="210" height="76"/>
  <text class="node-text" x="1523" y="335">SBR</text>
  <text class="small" x="1523" y="360">authority to outlay</text>
  <rect class="node statement" x="1505" y="425" width="210" height="76"/>
  <text class="node-text" x="1523" y="455">Balance sheet</text>
  <text class="small" x="1523" y="480">FBwT, AP, AR, assets</text>
  <rect class="node statement" x="1505" y="545" width="210" height="76"/>
  <text class="node-text" x="1523" y="575">Net cost / notes</text>
  <text class="small" x="1523" y="600">project + program cost</text>

  <path class="arrow" d="M 293 493 H 358"/>
  <path class="arrow" d="M 578 493 H 643"/>
  <path class="arrow" d="M 863 493 H 928"/>
  <path class="arrow" d="M 1148 493 H 1213"/>
  <path class="arrow" d="M 1433 493 H 1498"/>

  <rect class="callout" x="70" y="935" width="1660" height="92" rx="20"/>
  <text class="callout-text" x="100" y="970">Tech-stack note: public USACE pages identify CEFMS as the Corps of Engineers Financial Management System and describe it as complex and fully integrated.</text>
  <text class="callout-text" x="100" y="1000">The exact vendor database/application stack is not asserted here; use USACE/UFC authority for implementation-specific platform details.</text>
  <text class="caveat" x="70" y="1060">Source basis: USACE Finance Center, DoD/Treasury financial reporting requirements, and public federal accounting control patterns.</text>
</svg>
